services:
  - type: web
    name: fiverr-rank-checker
    env: node
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.render/chromium
